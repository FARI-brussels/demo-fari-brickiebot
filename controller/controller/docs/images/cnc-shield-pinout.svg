<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">CNC Shield pinout used by Brickiebot firmware</title>
  <desc id="desc">Simplified CNC Shield pinout showing step, direction, enable, motor, power, and limit pins used by controller.ino.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fa; }
      .board { fill: #f0fdf4; stroke: #14532d; stroke-width: 3; rx: 10; }
      .slot { fill: #ffffff; stroke: #166534; stroke-width: 2; rx: 6; }
      .pin { fill: #eef2ff; stroke: #4338ca; stroke-width: 1.5; }
      .limit { fill: #fef2f2; stroke: #b91c1c; stroke-width: 1.5; }
      .power { fill: #fefce8; stroke: #a16207; stroke-width: 1.5; }
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .label { font: 700 15px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .note { font: 12px Arial, sans-serif; fill: #4b5563; }
    </style>
  </defs>
  <rect class="bg" width="1000" height="620"/>
  <text class="title" x="40" y="48">CNC Shield Pinout Used By controller.ino</text>
  <text class="small" x="40" y="74">Simplified view of the shield connections used in this project.</text>

  <rect class="board" x="100" y="105" width="800" height="430"/>
  <text class="label" x="130" y="138">CNC Shield</text>

  <rect class="slot" x="150" y="175" width="145" height="190"/>
  <text class="label" x="196" y="204">X Axis</text>
  <rect class="pin" x="175" y="230" width="95" height="28"/><text class="small" x="190" y="249">STEP D2</text>
  <rect class="pin" x="175" y="270" width="95" height="28"/><text class="small" x="197" y="289">DIR D5</text>
  <text class="note" x="174" y="332">Motor output:</text>
  <text class="note" x="174" y="350">A+, A-, B+, B-</text>

  <rect class="slot" x="330" y="175" width="145" height="190"/>
  <text class="label" x="376" y="204">Y Axis</text>
  <rect class="pin" x="355" y="230" width="95" height="28"/><text class="small" x="370" y="249">STEP D3</text>
  <rect class="pin" x="355" y="270" width="95" height="28"/><text class="small" x="377" y="289">DIR D6</text>
  <text class="note" x="354" y="332">Motor output:</text>
  <text class="note" x="354" y="350">A+, A-, B+, B-</text>

  <rect class="slot" x="510" y="175" width="145" height="190"/>
  <text class="label" x="557" y="204">Z Axis</text>
  <rect class="pin" x="535" y="230" width="95" height="28"/><text class="small" x="550" y="249">STEP D4</text>
  <rect class="pin" x="535" y="270" width="95" height="28"/><text class="small" x="557" y="289">DIR D7</text>
  <text class="note" x="534" y="332">Motor output:</text>
  <text class="note" x="534" y="350">A+, A-, B+, B-</text>

  <rect class="slot" x="690" y="175" width="145" height="190"/>
  <text class="label" x="729" y="204">Enable</text>
  <rect class="pin" x="715" y="245" width="95" height="28"/><text class="small" x="737" y="264">EN D8</text>
  <text class="note" x="708" y="314">LOW enables</text>
  <text class="note" x="708" y="332">stepper drivers</text>

  <rect class="power" x="150" y="410" width="180" height="72"/>
  <text class="label" x="188" y="438">Motor Power</text>
  <text class="small" x="181" y="462">VMOT + GND input</text>

  <rect class="limit" x="380" y="405" width="420" height="85"/>
  <text class="label" x="405" y="432">Limit Inputs Used By This Firmware</text>
  <text class="small" x="405" y="456">D10 = Y left, D11 = Y right, D9 = Z</text>
  <text class="small" x="405" y="477">X limit is custom-wired to Arduino Mega D37, not shield X limit.</text>

  <text class="small" x="120" y="570">Note: CNC Shield variants differ. Check your board silk screen before plugging in drivers or power.</text>
</svg>
