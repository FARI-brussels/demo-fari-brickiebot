<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Arduino Mega pinout used by Brickiebot firmware</title>
  <desc id="desc">Simplified Arduino Mega 2560 pinout highlighting pins used by controller.ino.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fa; }
      .board { fill: #ecfeff; stroke: #155e75; stroke-width: 3; rx: 12; }
      .pin { fill: #ffffff; stroke: #155e75; stroke-width: 1.5; }
      .used-step { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .used-dir { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; }
      .used-en { fill: #d1fae5; stroke: #059669; stroke-width: 2; }
      .used-limit { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .label { font: 700 15px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .micro { font: 11px Arial, sans-serif; fill: #374151; }
    </style>
  </defs>
  <rect class="bg" width="1000" height="620"/>
  <text class="title" x="40" y="48">Arduino Mega 2560 Pins Used By controller.ino</text>
  <text class="small" x="40" y="74">Simplified project pinout. Unused pins are shown only as context.</text>

  <rect class="board" x="110" y="110" width="780" height="405"/>
  <text class="label" x="140" y="145">Arduino Mega 2560</text>
  <rect x="415" y="245" width="170" height="100" fill="#e5e7eb" stroke="#374151" stroke-width="2" rx="8"/>
  <text class="label" x="454" y="300">ATmega2560</text>

  <g>
    <rect class="pin" x="145" y="180" width="72" height="26"/><text class="micro" x="165" y="198">D0</text>
    <rect class="pin" x="145" y="210" width="72" height="26"/><text class="micro" x="165" y="228">D1</text>
    <rect class="used-step" x="145" y="240" width="96" height="26"/><text class="micro" x="160" y="258">D2 X STEP</text>
    <rect class="used-step" x="145" y="270" width="96" height="26"/><text class="micro" x="160" y="288">D3 Y STEP</text>
    <rect class="used-step" x="145" y="300" width="96" height="26"/><text class="micro" x="160" y="318">D4 Z STEP</text>
    <rect class="used-dir" x="145" y="330" width="96" height="26"/><text class="micro" x="165" y="348">D5 X DIR</text>
    <rect class="used-dir" x="145" y="360" width="96" height="26"/><text class="micro" x="165" y="378">D6 Y DIR</text>
    <rect class="used-dir" x="145" y="390" width="96" height="26"/><text class="micro" x="165" y="408">D7 Z DIR</text>
    <rect class="used-en" x="145" y="420" width="96" height="26"/><text class="micro" x="170" y="438">D8 EN</text>
    <rect class="used-limit" x="145" y="450" width="96" height="26"/><text class="micro" x="170" y="468">D9 Z LIM</text>
  </g>

  <g>
    <rect class="used-limit" x="755" y="180" width="102" height="26"/><text class="micro" x="775" y="198">D10 YL LIM</text>
    <rect class="used-limit" x="755" y="210" width="102" height="26"/><text class="micro" x="775" y="228">D11 YR LIM</text>
    <rect class="pin" x="785" y="240" width="72" height="26"/><text class="micro" x="805" y="258">D12</text>
    <rect class="pin" x="785" y="270" width="72" height="26"/><text class="micro" x="805" y="288">D13</text>
    <rect class="pin" x="785" y="300" width="72" height="26"/><text class="micro" x="805" y="318">D14</text>
    <rect class="pin" x="785" y="330" width="72" height="26"/><text class="micro" x="805" y="348">D15</text>
    <rect class="pin" x="785" y="360" width="72" height="26"/><text class="micro" x="805" y="378">D16</text>
    <rect class="pin" x="785" y="390" width="72" height="26"/><text class="micro" x="805" y="408">D17</text>
    <rect class="pin" x="785" y="420" width="72" height="26"/><text class="micro" x="805" y="438">D18</text>
    <rect class="pin" x="785" y="450" width="72" height="26"/><text class="micro" x="805" y="468">D19</text>
  </g>

  <g>
    <rect class="pin" x="305" y="125" width="64" height="24"/><text class="micro" x="323" y="142">D22</text>
    <rect class="pin" x="375" y="125" width="64" height="24"/><text class="micro" x="393" y="142">D24</text>
    <rect class="pin" x="445" y="125" width="64" height="24"/><text class="micro" x="463" y="142">D26</text>
    <rect class="pin" x="515" y="125" width="64" height="24"/><text class="micro" x="533" y="142">D28</text>
    <rect class="pin" x="585" y="125" width="64" height="24"/><text class="micro" x="603" y="142">D30</text>
    <rect class="pin" x="655" y="125" width="64" height="24"/><text class="micro" x="673" y="142">D32</text>
    <rect class="pin" x="305" y="475" width="64" height="24"/><text class="micro" x="323" y="492">D34</text>
    <rect class="pin" x="375" y="475" width="64" height="24"/><text class="micro" x="393" y="492">D36</text>
    <rect class="used-limit" x="445" y="475" width="88" height="24"/><text class="micro" x="462" y="492">D37 X LIM</text>
    <rect class="pin" x="545" y="475" width="64" height="24"/><text class="micro" x="563" y="492">D38</text>
    <rect class="pin" x="615" y="475" width="64" height="24"/><text class="micro" x="633" y="492">D40</text>
    <rect class="pin" x="685" y="475" width="64" height="24"/><text class="micro" x="703" y="492">D42</text>
  </g>

  <rect x="125" y="535" width="750" height="55" fill="#ffffff" stroke="#d1d5db"/>
  <rect class="used-step" x="145" y="552" width="20" height="16"/><text class="small" x="173" y="565">Step</text>
  <rect class="used-dir" x="245" y="552" width="20" height="16"/><text class="small" x="273" y="565">Direction</text>
  <rect class="used-en" x="375" y="552" width="20" height="16"/><text class="small" x="403" y="565">Enable</text>
  <rect class="used-limit" x="495" y="552" width="20" height="16"/><text class="small" x="523" y="565">Limit switch input</text>
  <text class="small" x="675" y="565">USB serial uses the Mega USB port.</text>
</svg>
