<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Brickiebot controller wiring scheme</title>
  <desc id="desc">Project wiring diagram for Arduino Mega, CNC Shield, three stepper drivers, motors, power supply, and limit switches.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fa; }
      .panel { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 8; }
      .header { fill: #e5e7eb; stroke: #1f2937; stroke-width: 2; }
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .label { font: 600 16px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .pin { fill: #eef2ff; stroke: #4338ca; stroke-width: 1.5; }
      .driver { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 6; }
      .motor { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 6; }
      .limit { fill: #fef2f2; stroke: #b91c1c; stroke-width: 2; rx: 6; }
      .power { fill: #fefce8; stroke: #a16207; stroke-width: 2; rx: 6; }
      .wire-step { stroke: #2563eb; stroke-width: 3; fill: none; }
      .wire-dir { stroke: #7c3aed; stroke-width: 3; fill: none; }
      .wire-en { stroke: #059669; stroke-width: 3; fill: none; }
      .wire-limit { stroke: #dc2626; stroke-width: 3; fill: none; }
      .wire-power { stroke: #ca8a04; stroke-width: 4; fill: none; }
      .wire-usb { stroke: #374151; stroke-width: 3; fill: none; stroke-dasharray: 8 5; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="780"/>
  <text class="title" x="40" y="48">Brickiebot Arduino Mega + CNC Shield Wiring</text>
  <text class="small" x="40" y="74">Signal names and pins come from controller.ino.</text>

  <rect class="panel" x="40" y="120" width="300" height="520"/>
  <rect class="header" x="40" y="120" width="300" height="50"/>
  <text class="label" x="62" y="152">Arduino Mega 2560</text>
  <rect class="pin" x="70" y="215" width="82" height="28"/><text class="small" x="84" y="234">D2 X STEP</text>
  <rect class="pin" x="70" y="255" width="82" height="28"/><text class="small" x="84" y="274">D5 X DIR</text>
  <rect class="pin" x="70" y="305" width="82" height="28"/><text class="small" x="84" y="324">D3 Y STEP</text>
  <rect class="pin" x="70" y="345" width="82" height="28"/><text class="small" x="84" y="364">D6 Y DIR</text>
  <rect class="pin" x="70" y="395" width="82" height="28"/><text class="small" x="84" y="414">D4 Z STEP</text>
  <rect class="pin" x="70" y="435" width="82" height="28"/><text class="small" x="84" y="454">D7 Z DIR</text>
  <rect class="pin" x="200" y="255" width="82" height="28"/><text class="small" x="221" y="274">D8 EN</text>
  <rect class="pin" x="200" y="500" width="82" height="28"/><text class="small" x="218" y="519">D37 X</text>
  <rect class="pin" x="200" y="540" width="82" height="28"/><text class="small" x="218" y="559">D10 YL</text>
  <rect class="pin" x="200" y="580" width="82" height="28"/><text class="small" x="218" y="599">D11 YR</text>
  <rect class="pin" x="200" y="620" width="82" height="28"/><text class="small" x="220" y="639">D9 Z</text>
  <text class="small" x="64" y="690">USB serial: 115200 baud</text>

  <rect class="panel" x="450" y="110" width="310" height="560"/>
  <rect class="header" x="450" y="110" width="310" height="50"/>
  <text class="label" x="470" y="142">CNC Shield</text>
  <text class="small" x="470" y="182">Stepper driver signal headers</text>
  <rect class="driver" x="490" y="215" width="180" height="70"/><text class="label" x="548" y="243">X Driver</text><text class="small" x="524" y="266">STEP D2 / DIR D5</text>
  <rect class="driver" x="490" y="315" width="180" height="70"/><text class="label" x="548" y="343">Y Driver</text><text class="small" x="524" y="366">STEP D3 / DIR D6</text>
  <rect class="driver" x="490" y="415" width="180" height="70"/><text class="label" x="548" y="443">Z Driver</text><text class="small" x="524" y="466">STEP D4 / DIR D7</text>
  <rect class="power" x="490" y="535" width="180" height="72"/><text class="label" x="528" y="562">Motor Power</text><text class="small" x="517" y="585">VMOT + GND input</text>

  <rect class="panel" x="870" y="155" width="250" height="430"/>
  <rect class="header" x="870" y="155" width="250" height="50"/>
  <text class="label" x="910" y="187">Machine Wiring</text>
  <rect class="motor" x="920" y="230" width="150" height="46"/><text class="label" x="958" y="260">X Motor</text>
  <rect class="motor" x="920" y="330" width="150" height="46"/><text class="label" x="958" y="360">Y Motor</text>
  <rect class="motor" x="920" y="430" width="150" height="46"/><text class="label" x="958" y="460">Z Motor</text>
  <rect class="power" x="920" y="535" width="150" height="46"/><text class="label" x="943" y="565">PSU VMOT</text>

  <rect class="limit" x="870" y="630" width="250" height="96"/>
  <text class="label" x="894" y="660">Limit switches to GND</text>
  <text class="small" x="894" y="684">X D37, YL D10, YR D11, Z D9</text>
  <text class="small" x="894" y="706">NC contact opens when triggered</text>

  <path class="wire-step" d="M152 229 C260 229 370 230 490 230"/>
  <path class="wire-dir" d="M152 269 C270 269 375 250 490 250"/>
  <path class="wire-step" d="M152 319 C260 319 370 330 490 330"/>
  <path class="wire-dir" d="M152 359 C270 359 375 350 490 350"/>
  <path class="wire-step" d="M152 409 C260 409 370 430 490 430"/>
  <path class="wire-dir" d="M152 449 C270 449 375 450 490 450"/>
  <path class="wire-en" d="M282 269 C350 269 390 185 580 185 C680 185 690 210 670 230"/>

  <path class="wire-step" d="M670 250 C765 250 840 253 920 253"/>
  <path class="wire-step" d="M670 350 C765 350 840 353 920 353"/>
  <path class="wire-step" d="M670 450 C765 450 840 453 920 453"/>
  <path class="wire-power" d="M670 570 C780 570 830 558 920 558"/>

  <path class="wire-limit" d="M282 514 C480 514 675 690 870 676"/>
  <path class="wire-limit" d="M282 554 C480 554 675 700 870 690"/>
  <path class="wire-limit" d="M282 594 C480 594 675 710 870 704"/>
  <path class="wire-limit" d="M282 634 C480 634 675 720 870 718"/>
  <path class="wire-usb" d="M70 690 C20 710 20 740 110 744"/>

  <rect x="40" y="705" width="610" height="42" fill="#ffffff" stroke="#d1d5db"/>
  <text class="small" x="58" y="731">Color key: blue step, purple direction, green enable, red limit switch, yellow motor power.</text>
</svg>
